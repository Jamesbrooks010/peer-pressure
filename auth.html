<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In | Peer Pressure</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell create-page-shell">
      <section class="topbar" aria-label="Sign in header">
        <div>
          <p class="eyebrow">Peer Pressure</p>
          <h1>Sign in.</h1>
          <p id="connectionStatus" class="connection-status">Use your email and password.</p>
        </div>
        <div class="top-actions">
          <a class="ghost-button action-link" href="index.html">Back</a>
        </div>
      </section>

      <section class="auth-grid compact-auth-grid">
        <aside class="panel create-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Existing Account</p>
              <h2>Sign In</h2>
            </div>
          </div>

          <form id="signinForm" class="stack">
            <label>
              Email
              <input id="signinEmail" required type="email" autocomplete="email" placeholder="you@example.com">
            </label>
            <label>
              Password
              <input id="signinPassword" required type="password" autocomplete="current-password">
            </label>
            <button class="primary-button" type="submit">Sign In</button>
            <a class="ghost-button action-link full-action" href="signup.html">Create Account</a>
          </form>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
