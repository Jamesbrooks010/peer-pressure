<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account | Peer Pressure</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell create-page-shell">
      <section class="topbar" aria-label="Account header">
        <div>
          <p class="eyebrow">Peer Pressure</p>
          <h1>Your account.</h1>
          <p id="connectionStatus" class="connection-status">Create an account or sign in.</p>
        </div>
        <div class="top-actions">
          <a class="ghost-button action-link" href="index.html">Back</a>
        </div>
      </section>

      <section class="auth-grid">
        <aside class="panel create-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">New Account</p>
              <h2>Create Account</h2>
            </div>
          </div>

          <form id="signupForm" class="stack">
            <label>
              Username
              <input id="signupUsername" required type="text" autocomplete="username" placeholder="james">
            </label>
            <label>
              Mobile number
              <input id="signupPhone" required type="tel" autocomplete="tel" placeholder="+61400111222">
            </label>
            <label>
              Password
              <input id="signupPassword" required type="password" autocomplete="new-password" minlength="8">
            </label>
            <button class="primary-button" type="submit">Send Code</button>
          </form>
        </aside>

        <aside class="panel create-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Verify</p>
              <h2>SMS Code</h2>
            </div>
          </div>

          <form id="verifyForm" class="stack">
            <label>
              Mobile number
              <input id="verifyPhone" required type="tel" autocomplete="tel" placeholder="+61400111222">
            </label>
            <label>
              Code
              <input id="verifyCode" required type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="123456">
            </label>
            <button class="primary-button" type="submit">Verify</button>
          </form>
        </aside>

        <aside class="panel create-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Existing Account</p>
              <h2>Sign In</h2>
            </div>
          </div>

          <form id="signinForm" class="stack">
            <label>
              Mobile number
              <input id="signinPhone" required type="tel" autocomplete="tel" placeholder="+61400111222">
            </label>
            <label>
              Password
              <input id="signinPassword" required type="password" autocomplete="current-password">
            </label>
            <button class="primary-button" type="submit">Sign In</button>
          </form>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="account.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
