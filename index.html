<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Peer Pressure</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Dashboard header">
        <div>
          <p class="eyebrow">Peer Pressure</p>
          <h1>Private bets, clear terms, clean payouts.</h1>
          <p id="connectionStatus" class="connection-status">Demo mode: bets are saved on this device.</p>
        </div>
        <div class="top-actions">
          <div class="identity-card">
            <label for="currentUser">You are</label>
            <input id="currentUser" type="text" autocomplete="name">
          </div>
          <a class="primary-button action-link" href="create.html">Create Bet</a>
        </div>
      </section>

      <section class="stats-grid" aria-label="Market summary">
        <article>
          <span id="activeCount">0</span>
          <p>Active</p>
        </article>
        <article>
          <span id="followedCount">0</span>
          <p>Followed</p>
        </article>
        <article>
          <span id="totalPool">$0</span>
          <p>Total Pool</p>
        </article>
        <article>
          <span id="settledCount">0</span>
          <p>Settled</p>
        </article>
      </section>

      <section id="marketView" class="workspace">
        <section class="market-area">
          <div class="market-toolbar">
            <div>
              <p class="eyebrow">Live Markets</p>
              <h2>Open Bets</h2>
            </div>
            <form id="inviteForm" class="invite-form">
              <input id="inviteCode" type="text" placeholder="Invite code">
              <button class="secondary-button" type="submit">Open</button>
            </form>
          </div>

          <div class="filters" role="tablist" aria-label="Market filters">
            <button class="filter-button active" data-filter="all" type="button">All</button>
            <button class="filter-button" data-filter="followed" type="button">Followed</button>
            <button class="filter-button" data-filter="open" type="button">Open</button>
            <button class="filter-button" data-filter="settled" type="button">Settled</button>
          </div>

          <div id="marketList" class="market-list" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <template id="marketCardTemplate">
      <article class="market-card">
        <div class="card-topline">
          <div class="pill-row">
            <span class="status-pill"></span>
            <span class="visibility-pill"></span>
          </div>
          <button class="ghost-button follow-button" type="button"></button>
        </div>

        <h3></h3>

        <dl class="meta-grid">
          <div>
            <dt>Umpire</dt>
            <dd class="umpire"></dd>
          </div>
          <div>
            <dt>Cutoff</dt>
            <dd class="cutoff"></dd>
          </div>
          <div>
            <dt>Deadline</dt>
            <dd class="deadline"></dd>
          </div>
        </dl>

        <p class="terms"></p>
        <p class="invite-read"></p>

        <div class="odds-row">
          <div class="side-box yes-box">
            <span>YES</span>
            <strong class="yes-pool"></strong>
            <small class="yes-odds"></small>
          </div>
          <div class="side-box no-box">
            <span>NO</span>
            <strong class="no-pool"></strong>
            <small class="no-odds"></small>
          </div>
        </div>

        <form class="entry-form">
          <input class="person-input" type="text" placeholder="Name" required>
          <select class="side-select" required>
            <option value="YES">YES</option>
            <option value="NO">NO</option>
          </select>
          <input class="amount-input" type="number" min="1" step="1" placeholder="$" required>
          <button class="secondary-button" type="submit">Join</button>
        </form>

        <div class="resolve-row">
          <span class="payout-read"></span>
          <div class="resolve-actions">
            <button class="tiny-button" data-outcome="YES" type="button">YES wins</button>
            <button class="tiny-button" data-outcome="NO" type="button">NO wins</button>
            <button class="tiny-button" data-outcome="VOID" type="button">Void</button>
          </div>
        </div>

        <details class="ledger">
          <summary>Entries and payouts</summary>
          <div class="ledger-body"></div>
        </details>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
