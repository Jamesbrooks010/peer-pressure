<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account | Peer Pressure</title>
    <link rel="stylesheet" href="styles.css?v=20260429b">
  </head>
  <body>
    <main class="app-shell create-page-shell">
      <section class="topbar" aria-label="Create account header">
        <div>
          <a class="eyebrow brand-link" href="index.html">Peer Pressure</a>
          <h1>Create account.</h1>
          <p id="connectionStatus" class="connection-status">We will send a verification email after signup.</p>
        </div>
        <div class="top-actions">
          <a class="ghost-button action-link" href="auth.html">Back</a>
        </div>
      </section>

      <section class="auth-grid compact-auth-grid">
        <aside class="panel create-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">New Account</p>
              <h2>Create Account</h2>
            </div>
          </div>

          <form id="signupForm" class="stack">
            <label>
              Username
              <input id="signupUsername" required type="text" autocomplete="username" placeholder="james">
            </label>
            <label>
              Email
              <input id="signupEmail" required type="email" autocomplete="email" placeholder="you@example.com">
            </label>
            <label>
              Password
              <input id="signupPassword" required type="password" autocomplete="new-password" minlength="8">
            </label>
            <button class="primary-button" type="submit">Create Account</button>
            <a class="ghost-button action-link full-action" href="auth.html">I already have an account</a>
          </form>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=20260429b"></script>
    <script src="auth.js?v=20260429b"></script>
  </body>
</html>
